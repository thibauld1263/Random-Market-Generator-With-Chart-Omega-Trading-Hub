<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Random Market Simulator</title>
  <meta name="description" content="A random walk market simulator with real-time candlestick chart visualization." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Header -->
  <header id="app-header">
    <div class="header-left">
      <div class="logo-pulse"></div>
      <h1>Random Market Simulator</h1>
      <span class="badge" id="status-badge">IDLE</span>
    </div>
    <div class="header-right">
      <div class="stat-pill">
        <span class="stat-label">Open</span>
        <span class="stat-value" id="stat-open">—</span>
      </div>
      <div class="stat-pill">
        <span class="stat-label">High</span>
        <span class="stat-value high" id="stat-high">—</span>
      </div>
      <div class="stat-pill">
        <span class="stat-label">Low</span>
        <span class="stat-value low" id="stat-low">—</span>
      </div>
      <div class="stat-pill">
        <span class="stat-label">Close</span>
        <span class="stat-value" id="stat-close">—</span>
      </div>
      <div class="stat-pill">
        <span class="stat-label">Volume</span>
        <span class="stat-value" id="stat-volume">—</span>
      </div>
      <div class="stat-pill">
        <span class="stat-label">Change</span>
        <span class="stat-value" id="stat-change">—</span>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main id="app-main">
    <!-- Sidebar Controls -->
    <aside id="controls-panel">
      <div class="panel-section">
        <h2 class="section-title">Simulation</h2>
        <div class="control-group">
          <label for="initial-price">Initial Price</label>
          <input type="number" id="initial-price" value="100" min="1" max="100000" step="1" />
        </div>
        <div class="control-group">
          <label for="volatility">Volatility <span class="param-value" id="vol-display">2.0%</span></label>
          <input type="range" id="volatility" min="0.1" max="10" step="0.1" value="2" />
        </div>
        <div class="control-group">
          <label for="drift">Drift (Trend) <span class="param-value" id="drift-display">0.00%</span></label>
          <input type="range" id="drift" min="-0.5" max="0.5" step="0.01" value="0" />
        </div>
        <div class="control-group">
          <label for="speed">Speed <span class="param-value" id="speed-display">500ms</span></label>
          <input type="range" id="speed" min="50" max="2000" step="50" value="500" />
        </div>
        <div class="control-group">
          <label for="candle-count">Pre-generate Candles</label>
          <input type="number" id="candle-count" value="200" min="10" max="5000" step="10" />
        </div>
      </div>

      <div class="panel-section">
        <h2 class="section-title">Overlays</h2>
        <div class="toggle-group">
          <label class="toggle-label">
            <input type="checkbox" id="toggle-sma" checked />
            <span class="toggle-switch"></span>
            SMA (20)
          </label>
        </div>
        <div class="toggle-group">
          <label class="toggle-label">
            <input type="checkbox" id="toggle-ema" />
            <span class="toggle-switch"></span>
            EMA (50)
          </label>
        </div>
        <div class="toggle-group">
          <label class="toggle-label">
            <input type="checkbox" id="toggle-volume" checked />
            <span class="toggle-switch"></span>
            Volume Bars
          </label>
        </div>
      </div>

      <div class="panel-section actions">
        <button class="btn btn-primary" id="btn-generate">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5,3 19,12 5,21"></polygon></svg>
          Generate
        </button>
        <button class="btn btn-accent" id="btn-stream">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
          Live Stream
        </button>
        <button class="btn btn-outline" id="btn-reset">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1,4 1,10 7,10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>
          Reset
        </button>
      </div>
    </aside>

    <!-- Chart Area -->
    <section id="chart-container">
      <div id="chart-wrapper">
        <div id="chart"></div>
        <div id="chart-overlay" class="overlay-idle">
          <div class="overlay-content">
            <div class="overlay-icon">📈</div>
            <p>Configure parameters and hit <strong>Generate</strong> or <strong>Live Stream</strong></p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- TradingView Lightweight Charts -->
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
  <script src="engine.js"></script>
  <script src="app.js"></script>
</body>
</html>
